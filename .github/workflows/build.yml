name: "Build"
on:
  push:
    branches: [ "**" ]
    tags-ignore: [ "**" ]
  pull_request:
  release:
    types: [ released ]
jobs:
  build:
    strategy:
      matrix:
        java: [ "25" ]
        os: [ "ubuntu-latest" ]
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"
      - name: "Setup JDK ${{ matrix.java }}"
        uses: "actions/setup-java@v5"
        with:
          distribution: 'temurin'
          java-version: "${{ matrix.java }}"
      - name: "Setup Gradle"
        uses: gradle/actions/setup-gradle@v5
      - name: "Build plugin"
        run: "./gradlew :build"
